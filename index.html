<!-- ====== نظام التعديل والحفظ على GitHub ====== -->
<script>
const GITHUB_CONFIG = {
  owner: 'abdoo606',
  repo: 'profile',
  branch: 'main',
  filePath: 'index.html'
};

function isEditMode() {
  return localStorage.getItem('admin_token') !== null;
}

function adminLogin() {
  const token = prompt('🔐 ألصق GitHub Token هنا:');
  if (token && token.startsWith('ghp_')) {
    localStorage.setItem('admin_token', token);
    alert('✅ تم تسجيل الدخول!');
    location.reload();
  } else if (token) {
    alert('❌ Token غير صحيح! يجب أن يبدأ بـ ghp_');
  }
}

function adminLogout() {
  if (confirm('تسجيل الخروج؟')) {
    localStorage.removeItem('admin_token');
    location.reload();
  }
}

async function saveToGitHub() {
  const token = localStorage.getItem('admin_token');
  if (!token) { alert('❌ سجل دخول أولاً!'); return; }

  const saveBtn = document.getElementById('saveBtn');
  const originalText = saveBtn.innerHTML;
  saveBtn.innerHTML = '⏳ جاري الحفظ...';
  saveBtn.disabled = true;

  try {
    // إخفاء شريط الأدمن قبل الحفظ
    const adminBar = document.getElementById('adminBar');
    const adminTrigger = document.getElementById('adminTrigger');
    if (adminBar) adminBar.style.display = 'none';
    if (adminTrigger) adminTrigger.style.display = 'none';
    
    const newContent = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
    
    // إعادة إظهار شريط الأدمن
    if (adminBar) adminBar.style.display = '';
    if (adminTrigger) adminTrigger.style.display = '';

    const getUrl = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.filePath}?ref=${GITHUB_CONFIG.branch}`;
    const fileRes = await fetch(getUrl, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (!fileRes.ok) throw new Error('فشل قراءة الملف');
    const fileData = await fileRes.json();

    const encodedContent = btoa(unescape(encodeURIComponent(newContent)));

    const updateRes = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.filePath}`, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: `تحديث - ${new Date().toLocaleString('ar')}`,
        content: encodedContent,
        sha: fileData.sha,
        branch: GITHUB_CONFIG.branch
      })
    });

    if (!updateRes.ok) {
      const err = await updateRes.json();
      throw new Error(err.message);
    }

    saveBtn.innerHTML = '✅ تم!';
    setTimeout(() => {
      saveBtn.innerHTML = originalText;
      saveBtn.disabled = false;
    }, 2000);
    alert('✅ تم الحفظ!\nسيظهر التحديث للجميع خلال 1-2 دقيقة.');

  } catch (error) {
    saveBtn.innerHTML = originalText;
    saveBtn.disabled = false;
    alert('❌ خطأ: ' + error.message);
  }
}

function createAdminUI() {
  // زر شفاف مخفي في الزاوية اليمنى السفلية
  const trigger = document.createElement('div');
  trigger.id = 'adminTrigger';
  trigger.onclick = () => {
    if (isEditMode()) {
      adminLogout();
    } else {
      adminLogin();
    }
  };
  trigger.style.cssText = `
    position: fixed;
    bottom: 5px;
    right: 5px;
    width: 25px;
    height: 25px;
    background: transparent;
    cursor: pointer;
    z-index: 99999;
  `;
  document.body.appendChild(trigger);

  // شريط الحفظ يظهر فقط في وضع الأدمن
  if (isEditMode()) {
    const bar = document.createElement('div');
    bar.id = 'adminBar';
    bar.style.cssText = `
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 2px solid #00d4ff;
      border-radius: 50px;
      padding: 12px 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 99999;
      box-shadow: 0 10px 40px rgba(0,212,255,0.4);
      font-family: 'Segoe UI', sans-serif;
    `;
    bar.innerHTML = `
      <span style="color:#00d4ff;font-weight:bold;font-size:13px;">🔓 وضع التعديل</span>
      <button id="saveBtn" onclick="saveToGitHub()" style="
        background:linear-gradient(135deg,#00d4ff,#0099bb);
        color:white;border:none;padding:8px 18px;
        border-radius:25px;cursor:pointer;font-weight:bold;font-size:13px;
      ">💾 حفظ</button>
      <button onclick="adminLogout()" style="
        background:#ff4757;color:white;border:none;
        padding:8px 14px;border-radius:25px;cursor:pointer;font-size:13px;
      ">🚪 خروج</button>
    `;
    document.body.appendChild(bar);
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', createAdminUI);
} else {
  createAdminUI();
}
</script>
